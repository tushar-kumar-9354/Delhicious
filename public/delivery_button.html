<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <title>Order Confirmed - DELHICIOUS PIZZA CORNER</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #fff5f5;
            font-family: 'Outfit', sans-serif;
            color: #2d1b11;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
        }

        .preparing-card {
            background-color: #ffffff;
            width: 100%;
            max-width: 480px;
            border-radius: 28px;
            box-shadow: 0 20px 60px rgba(45, 27, 17, 0.1);
            overflow: hidden;
            border: 1px solid rgba(45, 27, 17, 0.05);
            display: flex;
            flex-direction: column;
            animation: scaleUp 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .preparing-video-wrapper {
            position: relative;
            width: 100%;
            height: 280px;
            overflow: hidden;
        }

        .preparing-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .preparing-video-badge {
            position: absolute;
            top: 16px;
            left: 16px;
            background-color: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 6px 14px;
            border-radius: 9999px;
            font-size: 0.8rem;
            font-weight: 800;
            color: #2d1b11;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .preparing-content {
            padding: 30px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .success-icon {
            font-size: 2.8rem;
            margin-bottom: 14px;
        }

        .preparing-title {
            font-size: 1.7rem;
            font-weight: 850;
            color: #2d1b11;
            margin-bottom: 8px;
        }

        .preparing-text {
            font-size: 0.95rem;
            line-height: 1.5;
            color: #6e5d54;
            margin-bottom: 24px;
        }

        .btn-back-home {
            display: block;
            background-color: #b32619;
            color: #ffffff;
            border: none;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 700;
            padding: 14px 28px;
            border-radius: 9999px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(179, 38, 25, 0.2);
            transition: all 0.2s ease;
            width: 100%;
            text-decoration: none;
            text-align: center;
        }

        .btn-back-home:hover {
            background-color: #9c2014;
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(179, 38, 25, 0.3);
        }

        @keyframes scaleUp {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>

<body>
    <div class="preparing-card">
        <div class="preparing-video-wrapper">
            <video src="/preparing.mp4" autoplay loop muted playsinline class="preparing-video"></video>
            <div class="preparing-video-badge">
                🚚 Out for Delivery
            </div>
        </div>

        <div class="preparing-content">
            <div class="success-icon">🎉</div>
            <h2 class="preparing-title">Order Placed Successfully!</h2>
            <p class="preparing-text">
                Your order is being prepared and will be delivered shortly. Till then, explore more options on our menu!
            </p>

            <a href="/" class="btn-back-home">Back to Home Page</a>
        </div>
    </div>
</body>

</html>
